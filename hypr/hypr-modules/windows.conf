# Window rules - assign apps to specific workspaces
windowrulev2 = workspace 1 silent, class:^kitty$
windowrulev2 = workspace 2 silent, class:^firefox$
windowrulev2 = workspace 3 silent, class:^firefox-developer-edition$
windowrulev2 = workspace 4 silent, class:^librewolf$
windowrulev2 = workspace 5 silent, class:^chrome-github.com__-Default$
windowrulev2 = workspace 6 silent, class:^chrome-claude.ai__-Default$
windowrulev2 = workspace 7 silent, class:^chrome-figma.com__-Default$
windowrulev2 = workspace 8 silent, class:^code$
windowrulev2 = workspace 9 silent, class:^1password$
windowrulev2 = workspace 10 silent, class:^spotify$
windowrulev2 = workspace 11 silent, class:^thunar$

windowrulev2 = float, class:^floating-bluetui$
windowrulev2 = center, class:^floating-bluetui$
windowrulev2 = size 800 600, class:^floating-bluetui$

windowrulev2 = float, class:^wifi-tui$
windowrulev2 = center, class:^wifi-tui$
windowrulev2 = size 1400 800, class:^wifi-tui$
